<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EasyIngest</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <h1>视频整理工具</h1>
      <section class="card">
        <div class="row">
          <label>输入目录</label>
          <input id="inputDir" placeholder="/path/to/input" />
        </div>
        <div class="row">
          <label>输出目录</label>
          <input id="outputDir" placeholder="/path/to/output" />
        </div>
        <div class="actions">
          <button id="scanBtn">扫描并识别</button>
          <button id="recomputeBtn" disabled>预览修改</button>
          <button id="applyBtn" disabled>确认执行</button>
          <a class="link-btn" href="/debug">识别调试页</a>
        </div>
        <p id="summary"></p>
        <div id="progressWrap" class="progress-wrap hidden">
          <div id="progressBar" class="progress-bar"></div>
        </div>
      </section>

      <section class="card">
        <table id="resultTable">
          <thead>
            <tr>
              <th>执行</th>
              <th>原始名称</th>
              <th>片名</th>
              <th>年份</th>
              <th>类型</th>
              <th>入库季</th>
              <th>集数/字幕</th>
              <th>建议目标路径</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>

    </main>

    <script src="/main.js"></script>
  </body>
</html>
