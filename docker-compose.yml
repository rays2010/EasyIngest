services:
  easyingest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: easyingest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - ALL_PROXY=${ALL_PROXY:-}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
    ports:
      - "${HOST_PORT:-3000}:${PORT:-3000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./tasks:/app/tasks
      - ./logs:/app/logs
      - ${INPUT_HOST_DIR:-/volume3/docker/EasyIngest/input}:/data/input
      - ${OUTPUT_HOST_DIR:-/volume3/docker/EasyIngest/output}:/data/output
      - ${INPUT_HOST_DIR:-/volume3/docker/EasyIngest/input}:${INPUT_HOST_DIR:-/volume3/docker/EasyIngest/input}
      - ${OUTPUT_HOST_DIR:-/volume3/docker/EasyIngest/output}:${OUTPUT_HOST_DIR:-/volume3/docker/EasyIngest/output}
